<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PH03NIX GRID AI</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#001f4d,#0a2472);
  color:gold;
}
.container {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}
input,button {
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}
button {
  background:gold;
  color:black;
  font-weight:bold;
}
.hidden { display:none; }
.chat {
  width:90%;
  max-width:500px;
  height:300px;
  overflow:auto;
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:10px;
}
.msg { margin:5px 0; }
</style>
</head>

<body>

<div id="login" class="container">
  <h1>PH03NIX GRID</h1>
  <input id="name" placeholder="Enter name">
  <button onclick="login()">Enter</button>
  <button onclick="showAdminLogin()">Admin</button>
</div>

<div id="dashboard" class="container hidden">
  <h2 id="welcome"></h2>
  <button onclick="openAI()">Open AI</button>
</div>

<div id="aiPage" class="container hidden">
  <h2>PH03NIX AI</h2>
  <div class="chat" id="chat"></div>
  <input id="aiInput" placeholder="Ask anything...">
  <button onclick="askAI()">Send</button>
  <button onclick="startVoice()">🎤</button>
</div>

<div id="adminLogin" class="container hidden">
  <input type="password" id="adminPass" placeholder="Password">
  <button onclick="adminLogin()">Login</button>
</div>

<div id="adminPanel" class="container hidden">
  <h2>ADMIN</h2>
  <p>You are logged in</p>
</div>

<script>

let adminPassword = "ph03nix";

function login(){
  let name = document.getElementById('name').value;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('welcome').innerText = 'HEY ' + name;
}

function showAdminLogin(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('adminLogin').classList.remove('hidden');
}

function adminLogin(){
  let pass = document.getElementById('adminPass').value;
  if(pass === adminPassword){
    document.getElementById('adminLogin').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
  } else {
    alert('Wrong password');
  }
}

function openAI(){
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('aiPage').classList.remove('hidden');
}

async function askAI(){
  let input = document.getElementById('aiInput').value;
  let chat = document.getElementById('chat');

  chat.innerHTML += <div class='msg'><b>You:</b> ${input}</div>;

  try {
    let res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer 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"
      },
      body: JSON.stringify({
        model: "openai/gpt-3.5-turbo",
        messages: [{ role: "user", content: input }]
      })
    });

    let data = await res.json();
    let reply = data.choices[0].message.content;

    chat.innerHTML += <div class='msg'><b>AI:</b> ${reply}</div>;

  } catch (err) {
    chat.innerHTML += <div class='msg'>Error connecting to AI</div>;
  }
}

function startVoice(){
  let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.start();

  rec.onresult = function(e){
    let text = e.results[0][0].transcript;
    document.getElementById('aiInput').value = text;
    askAI();
  }
}

</script>

</body>
</html>
